.bilingual-paragraph {

}

.bilingual-paragraph.english {
    border-left: 3px solid #0366d6;
    padding-left: 1rem;
    margin-bottom: 1rem;
}

.bilingual-paragraph.chinese {
    border-left: 3px solid #159957;

    margin-bottom: 1.5rem;

}

body.dark-mode .bilingual-paragraph.chinese {

}

    margin: 1rem 0;
}

.bilingual-section {

}

/* 语言标签样式 */
.lang-label {
    display: inline-block;

    margin-bottom: 0.25rem;
}

.lang-label.en {
    background-color: #0366d6;

}

.lang-label.zh {
    background-color: #159957;
